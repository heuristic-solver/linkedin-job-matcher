services:
  - type: web
    name: ai-resume-matcher
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: USE_EXTERNAL_FEEDS
        value: "true"
    healthCheckPath: /health
    plan: starter

